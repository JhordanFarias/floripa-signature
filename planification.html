<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floripa Port | Expériences Premium au Brésil</title>
<link rel="stylesheet" href="style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="form-hero">

    <video autoplay muted loop playsinline class="hero-video">
        <source src="videos/floripa.mp4" type="video/mp4">
    </video>

    <div class="hero-overlay"></div>

    <nav>
        <div class="logo">Floripa Signature</div>

        <ul>
            <li>
                <a href="index.html">
                    Retour
                </a>
            </li>
        </ul>
    </nav>

    <div class="form-hero-content">

        <span class="mini-label">
            PLANIFICATION
        </span>

        <h1>
            Chaque expérience<br>
            commence par une intention.
        </h1>

        <p>
            Décrivez le voyage idéal que vous imaginez.
            Nous concevrons ensuite une expérience pensée
            dans les moindres détails.
        </p>

    </div>

</header>

<section class="planning-form-section">

   <form 
    class="planning-form"
    action="https://formspree.io/f/mnjrjnal"
    method="POST"
>

    <div class="form-group">
        <label>Nom complet</label>

        <input 
            type="text" 
            name="nom"
            placeholder="Votre nom"
            required
        >
    </div>

    <div class="form-group">
        <label>Email</label>

        <input 
            type="email" 
            name="email"
            placeholder="Votre email"
            required
        >
    </div>

    <div class="form-group">
        <label>État civil</label>

        <select name="etat_civil">

            <option>Marié(e)</option>
            <option>En couple</option>
            <option>Célibataire</option>

        </select>
    </div>

    <div class="form-group">
        <label>Voyage avec enfants ?</label>

        <select name="enfants">

            <option>Non</option>
            <option>1 enfant</option>
            <option>2 enfants</option>
            <option>3 enfants</option>
            <option>4+ enfants</option>

        </select>
    </div>

    <div class="form-group">
        <label>Type de logement</label>

        <select name="logement">

            <option>Hôtel de luxe</option>
            <option>Hôtel confortable</option>
            <option>Villa / Airbnb privé</option>

        </select>
    </div>

    <div class="form-group">

        <label>Ambiance recherchée</label>

        <div class="checkbox-group">

            <label class="checkbox-item">
                <input type="checkbox" name="ambiance[]" value="Plages & nature">
                <span>Plages & nature</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" name="ambiance[]" value="Aventure & sensations fortes">
                <span>Aventure & sensations fortes</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" name="ambiance[]" value="Excursions maritimes & îles">
                <span>Excursions maritimes & îles</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" name="ambiance[]" value="Vie nocturne & festivals">
                <span>Vie nocturne & festivals</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" name="ambiance[]" value="Gastronomie & vignobles">
                <span>Gastronomie & vignobles</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" name="ambiance[]" value="Culture & immersion locale">
                <span>Culture & immersion locale</span>
            </label>

            <label class="checkbox-item">
                <input type="checkbox" name="ambiance[]" value="Bien-être & détente">
                <span>Bien-être & détente</span>
            </label>

        </div>

    </div>

    <div class="form-group">
        <label>Budget approximatif</label>

        <select name="budget">

            <option>5 000$ à 10 000$ CAD</option>
            <option>10 000$ à 20 000$ CAD</option>
            <option>20 000$ à 40 000$ CAD</option>
            <option>40 000$+ CAD</option>

        </select>
    </div>

    <div class="form-group">
        <label>Billets d’avion</label>

        <select name="billets_avion">

            <option>Je préfère les acheter moi-même</option>
            <option>Je souhaite une prise en charge complète</option>

        </select>
    </div>

    <div class="form-group">
        <label>Restrictions alimentaires ou allergies</label>

        <select name="restrictions">

            <option>Aucune</option>
            <option>Oui (merci de préciser ci-dessous)</option>

        </select>
    </div>

    <div class="form-group">

        <label>Précisions complémentaires</label>

        <textarea 
            name="precisions"
            placeholder="Préférences, allergies, attentes particulières, occasions spéciales..."
        ></textarea>

    </div>

    <button type="submit" class="gold-button">
        Envoyer la demande
    </button>

</form>

</section>

</body>

</html>
